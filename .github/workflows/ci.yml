name: Automation Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run API tests
        run: pytest tests/api/ -v --tb=short --alluredir=allure-results
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'https://automationexercise.com' }}
          API_URL: ${{ secrets.API_URL || 'https://automationexercise.com/api' }}

      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline

      - name: Generate Allure report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-api
          path: allure-report

  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run UI tests (headless)
        run: pytest tests/ui/ -v --tb=short --alluredir=allure-results
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'https://automationexercise.com' }}
          API_URL: ${{ secrets.API_URL || 'https://automationexercise.com/api' }}
          HEADLESS: "true"

      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline

      - name: Generate Allure report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-ui
          path: allure-report

  publish-reports:
    name: Publish Reports
    runs-on: ubuntu-latest
    needs: [api-tests, ui-tests]
    if: always()

    steps:
      - name: Download API report
        uses: actions/download-artifact@v4
        with:
          name: allure-report-api
          path: reports/api

      - name: Download UI report
        uses: actions/download-artifact@v4
        with:
          name: allure-report-ui
          path: reports/ui

      - name: Create index page
        run: |
          cat > reports/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Test Reports</title>
            <style>
              * { box-sizing: border-box; margin: 0; padding: 0; }
              body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #1a1a2e; color: white; }
              h1 { margin-bottom: 40px; font-size: 28px; }
              .buttons { display: flex; gap: 24px; }
              a { padding: 18px 40px; border-radius: 8px; text-decoration: none; font-size: 18px; font-weight: bold; transition: opacity 0.2s; }
              a:hover { opacity: 0.8; }
              .ui  { background: #4a90d9; color: white; }
              .api { background: #27ae60; color: white; }
            </style>
          </head>
          <body>
            <h1>Test Reports</h1>
            <div class="buttons">
              <a class="ui"  href="ui/">UI Tests</a>
              <a class="api" href="api/">API Tests</a>
            </div>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: reports
