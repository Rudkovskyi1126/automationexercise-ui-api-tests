<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Test Reports</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #1a1a2e; color: white; }
    h1 { margin-bottom: 40px; font-size: 28px; }
    .buttons { display: flex; gap: 24px; }
    a { padding: 18px 40px; border-radius: 8px; text-decoration: none; font-size: 18px; font-weight: bold; transition: opacity 0.2s; }
    a:hover { opacity: 0.8; }
    .ui  { background: #4a90d9; color: white; }
    .api { background: #27ae60; color: white; }
  </style>
</head>
<body>
  <h1>Test Reports</h1>
  <div class="buttons">
    <a class="ui"  href="ui/">UI Tests</a>
    <a class="api" href="api/">API Tests</a>
  </div>
</body>
</html>
